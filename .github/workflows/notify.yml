name: arXiv quant-ph notifier

on:
  schedule:
    # arXivの新着アナウンスは平日 00:00 UTC 頃(米東部20:00, JST 09:00頃)。
    # アナウンス直後と日中に複数回実行し、取りこぼしと遅延を緩和する。
    # seen_ids.json により新着のみ投稿されるため、重複は発生しない。
    - cron: "5 1 * * 1-6"    # UTC 01:05 = JST 10:05 (アナウンス直後)
    - cron: "0 4 * * 1-6"    # UTC 04:00 = JST 13:00
    - cron: "0 7 * * 1-6"    # UTC 07:00 = JST 16:00
  workflow_dispatch:
    inputs:
      use_test_feed:
        description: "test_feed.xml を使う (本番RSSの代わり)"
        type: boolean
        default: false


permissions:
  contents: write

concurrency:
  group: arxiv-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run notifier
        env:
          DISCORD_WEBHOOK_GENERAL: ${{ secrets.DISCORD_WEBHOOK_GENERAL }}
          DISCORD_WEBHOOK_QEC: ${{ secrets.DISCORD_WEBHOOK_QEC }}
          DISCORD_WEBHOOK_FT: ${{ secrets.DISCORD_WEBHOOK_FT }}
          DISCORD_WEBHOOK_ALGO: ${{ secrets.DISCORD_WEBHOOK_ALGO }}
          DISCORD_WEBHOOK_COMPLEXITY: ${{ secrets.DISCORD_WEBHOOK_COMPLEXITY }}
          DISCORD_WEBHOOK_NISQ: ${{ secrets.DISCORD_WEBHOOK_NISQ }}
          DISCORD_WEBHOOK_SIM: ${{ secrets.DISCORD_WEBHOOK_SIM }}
          DISCORD_WEBHOOK_QML: ${{ secrets.DISCORD_WEBHOOK_QML }}
          DISCORD_WEBHOOK_QIT: ${{ secrets.DISCORD_WEBHOOK_QIT }}
          DISCORD_WEBHOOK_NETWORK: ${{ secrets.DISCORD_WEBHOOK_NETWORK }}
          DISCORD_WEBHOOK_CRYPTO: ${{ secrets.DISCORD_WEBHOOK_CRYPTO }}
          DISCORD_WEBHOOK_PQC: ${{ secrets.DISCORD_WEBHOOK_PQC }}
          DISCORD_WEBHOOK_HARDWARE: ${{ secrets.DISCORD_WEBHOOK_HARDWARE }}
          DISCORD_WEBHOOK_SENSING: ${{ secrets.DISCORD_WEBHOOK_SENSING }}
          DISCORD_WEBHOOK_FOUNDATIONS: ${{ secrets.DISCORD_WEBHOOK_FOUNDATIONS }}
          DISCORD_WEBHOOK_OTHER: ${{ secrets.DISCORD_WEBHOOK_OTHER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          ARXIV_TEST_FEED: ${{ inputs.use_test_feed == true && 'test_feed.xml' || '' }}
        run: python arxiv_bot.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json posted_log.json
          git diff --cached --quiet || git commit -m "update seen_ids [skip ci]"
          git push
