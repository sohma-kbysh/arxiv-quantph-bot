name: SciRate weekly quant-ph digest

on:
  schedule:
    # Weekend digest for the previous 7 days.
    # UTC 00:30 Sunday = JST 09:30 Sunday.
    - cron: "30 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scirate-weekly
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run SciRate weekly notifier
        env:
          DISCORD_WEBHOOK_GENERAL: ${{ secrets.DISCORD_WEBHOOK_GENERAL }}
          DISCORD_WEBHOOK_BOT_EMERGENCY: ${{ secrets.DISCORD_WEBHOOK_BOT_EMERGENCY }}
          DISCORD_WEBHOOK_QEC: ${{ secrets.DISCORD_WEBHOOK_QEC }}
          DISCORD_WEBHOOK_FT: ${{ secrets.DISCORD_WEBHOOK_FT }}
          DISCORD_WEBHOOK_ALGO: ${{ secrets.DISCORD_WEBHOOK_ALGO }}
          DISCORD_WEBHOOK_COMPLEXITY: ${{ secrets.DISCORD_WEBHOOK_COMPLEXITY }}
          DISCORD_WEBHOOK_NISQ: ${{ secrets.DISCORD_WEBHOOK_NISQ }}
          DISCORD_WEBHOOK_SIM: ${{ secrets.DISCORD_WEBHOOK_SIM }}
          DISCORD_WEBHOOK_QML: ${{ secrets.DISCORD_WEBHOOK_QML }}
          DISCORD_WEBHOOK_QIT: ${{ secrets.DISCORD_WEBHOOK_QIT }}
          DISCORD_WEBHOOK_NETWORK: ${{ secrets.DISCORD_WEBHOOK_NETWORK }}
          DISCORD_WEBHOOK_CRYPTO: ${{ secrets.DISCORD_WEBHOOK_CRYPTO }}
          DISCORD_WEBHOOK_PQC: ${{ secrets.DISCORD_WEBHOOK_PQC }}
          DISCORD_WEBHOOK_HARDWARE: ${{ secrets.DISCORD_WEBHOOK_HARDWARE }}
          DISCORD_WEBHOOK_SENSING: ${{ secrets.DISCORD_WEBHOOK_SENSING }}
          DISCORD_WEBHOOK_FOUNDATIONS: ${{ secrets.DISCORD_WEBHOOK_FOUNDATIONS }}
          DISCORD_WEBHOOK_OTHER: ${{ secrets.DISCORD_WEBHOOK_OTHER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          AZURE_TRANSLATOR_KEY: ${{ secrets.AZURE_TRANSLATOR_KEY }}
          AZURE_TRANSLATOR_REGION: ${{ secrets.AZURE_TRANSLATOR_REGION }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
        run: python scirate_weekly.py

      - name: Commit weekly state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scirate_weekly_state.json posted_log.json
          git diff --cached --quiet || git commit -m "update scirate weekly state [skip ci]"
          git push
